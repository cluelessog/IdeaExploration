{% extends "base.html" %}

{% block title %}Pipeline Progress - IdeaGen{% endblock %}

{% block content %}
{% if error %}
<article>
    <header>Error</header>
    <p>{{ error }}</p>
    <a href="/pipeline/new">Try again</a>
</article>
{% else %}
<h1>Pipeline Progress</h1>
<p>Task ID: <code>{{ task_id }}</code></p>

<form method="post" action="/pipeline/cancel/{{ task_id }}">
    <button type="submit" class="outline secondary" id="cancel-btn">Cancel</button>
</form>

<div id="events-container">
    <p>Connecting to event stream...</p>
</div>

<style>
    .stage-event { padding: 4px 0; font-family: monospace; font-size: 0.9em; border-bottom: 1px solid var(--pico-muted-border-color); }
    .stage-event[data-event-type="stage_started"] { color: var(--pico-primary); }
    .stage-event[data-event-type="stage_completed"] { color: var(--pico-ins-color); }
    .stage-event[data-event-type="error"] { color: var(--pico-del-color); }
    .stage-event[data-event-type="source_failed"] { color: var(--pico-del-color); opacity: 0.8; }
    .stage-event[data-event-type="idea_generated"] { color: var(--pico-primary); }
    .stage-event[data-event-type="done"] { color: var(--pico-ins-color); font-weight: bold; }
    .stage-event .timestamp { color: var(--pico-muted-color); margin-right: 8px; }
    .stage-event .meta { color: var(--pico-muted-color); font-size: 0.85em; }
</style>
<script>
(function() {
    var container = document.getElementById('events-container');
    var cancelBtn = document.getElementById('cancel-btn');
    var source = new EventSource('/pipeline/events/{{ task_id }}');
    var startTime = Date.now();

    function elapsed() {
        return ((Date.now() - startTime) / 1000).toFixed(1) + 's';
    }

    function addEvent(type, text, meta) {
        var div = document.createElement('div');
        div.className = 'stage-event';
        div.setAttribute('data-event-type', type);
        var icon = '&#8226;';
        if (type === 'stage_started') icon = '&#9654;';
        else if (type === 'stage_completed') icon = '&#10004;';
        else if (type === 'error' || type === 'source_failed') icon = '&#10060;';
        else if (type === 'done') icon = '&#127881;';
        else if (type === 'cancelled') icon = '&#9940;';
        else if (type === 'idea_generated') icon = '&#128161;';
        else if (type === 'cache_empty_warning' || type === 'duplicate_run_warning') icon = '&#9888;';
        var html = '<span class="timestamp">[' + elapsed() + ']</span> ' +
                   '<span class="stage-icon">' + icon + '</span> ' +
                   '<span class="stage-text">' + text + '</span>';
        if (meta) html += '<br><span class="meta">&nbsp;&nbsp;&nbsp;&nbsp;' + meta + '</span>';
        div.innerHTML = html;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    source.addEventListener('stage_started', function(e) {
        var data = JSON.parse(e.data);
        var meta = data.metadata ? JSON.stringify(data.metadata) : '';
        addEvent('stage_started', 'Stage: ' + data.stage, meta);
    });
    source.addEventListener('stage_completed', function(e) {
        var data = JSON.parse(e.data);
        var dur = data.duration_ms >= 1000 ? (data.duration_ms / 1000).toFixed(1) + 's' : data.duration_ms + 'ms';
        var meta = data.metadata ? JSON.stringify(data.metadata) : '';
        addEvent('stage_completed', 'Completed: ' + data.stage + ' (' + dur + ')', meta);
    });
    source.addEventListener('source_failed', function(e) {
        var data = JSON.parse(e.data);
        addEvent('source_failed', 'Source failed: ' + (data.source || 'unknown'), data.error || '');
    });
    source.addEventListener('idea_generated', function(e) {
        var data = JSON.parse(e.data);
        var title = data.idea ? data.idea.title : 'untitled';
        var score = data.idea && data.idea.wtp_score ? ' (WTP: ' + data.idea.wtp_score + ')' : '';
        addEvent('idea_generated', 'Idea ' + (data.index + 1) + '/' + data.total + ': ' + title + score);
    });
    source.addEventListener('pipeline_complete', function(e) {
        var data = JSON.parse(e.data);
        var meta = data.run_id ? 'Run ID: ' + data.run_id : '';
        addEvent('done', 'Pipeline complete!', meta);
    });
    source.addEventListener('cache_empty_warning', function(e) {
        addEvent('cache_empty_warning', 'Cache is empty — no data to reuse');
    });
    source.addEventListener('duplicate_run_warning', function(e) {
        var data = JSON.parse(e.data);
        addEvent('duplicate_run_warning', 'Duplicate run detected', data.matching_run_ids ? 'Matches: ' + data.matching_run_ids.join(', ') : '');
    });
    source.addEventListener('done', function(e) {
        addEvent('done', 'Pipeline finished successfully!');
        source.close();
        if (cancelBtn) cancelBtn.disabled = true;
    });
    source.addEventListener('error', function(e) {
        if (e.data) {
            var data = JSON.parse(e.data);
            addEvent('error', 'Error: ' + data.error);
        }
        source.close();
        if (cancelBtn) cancelBtn.disabled = true;
    });
    source.addEventListener('cancelled', function(e) {
        addEvent('cancelled', 'Pipeline cancelled.');
        source.close();
        if (cancelBtn) cancelBtn.disabled = true;
    });
    source.addEventListener('status', function(e) {
        container.innerHTML = '';
        startTime = Date.now();
        addEvent('status', 'Pipeline started');
    });
    source.onmessage = function(e) {
        // Catch-all for any unhandled event types
        addEvent('debug', 'Event: ' + e.data);
    };
    source.onerror = function(e) {
        addEvent('error', 'Connection lost. <a href="/pipeline/new">Start a new run</a>');
        source.close();
        if (cancelBtn) cancelBtn.disabled = true;
    };
})();
</script>
{% endif %}
{% endblock %}
